document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fspan>trench<\u002Fbutton>\n    <div style=\"width:1px;height:24px;background:var(--border,#322641);flex:none;\"><\u002Fdiv>\n    <div style=\"display:flex;gap:7px;flex:1;min-width:0;overflow:hidden;\">\n      <sc-for list=\"{{ taskbarTabs }}\" as=\"tab\" hint-placeholder-count=\"2\">\n        <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\"><span style=\"font-size:12px;\">{{ tab.glyph }}<\u002Fspan><span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ tab.title }}<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ toggleTheme }}\" style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:14px;color:var(--muted,#9A8FAA);background:transparent;border:1px solid var(--border,#322641);width:34px;height:34px;border-radius:9px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;\" style-hover=\"color:var(--gold,#F5B02E);border-color:var(--gold,#F5B02E)\">{{ themeGlyph }}<\u002Fbutton>\n    <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12.5px;color:var(--text,#EDE7F2);font-variant-numeric:tabular-nums;flex:none;\">{{ clock }}<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--surface2,#221A2B);border:1px solid var(--border,#322641);border-radius:9px;flex:none;\">\n      <span style=\"width:6px;height:6px;border-radius:50%;background:var(--gold,#F5B02E);\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;font-weight:600;color:var(--gold,#F5B02E);font-variant-numeric:tabular-nums;\">{{ balanceStr }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look&quot;},&quot;livePrices&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4C86F0&quot;,&quot;options&quot;:[&quot;#4C86F0&quot;,&quot;#33A9C4&quot;,&quot;#6E7CF0&quot;,&quot;#7C8AA0&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look&quot;}}\">\nclass Component extends DCLogic {\n  appInfo = {\n    degenfun:{title:'Degen.Fun',glyph:'◈'},\n    chirper:{title:'Chirper',glyph:'✸'},\n    internet:{title:'Internet',glyph:'⊕',msg:'NET_LINK severed. Reconnect fee: 0.50 DGENZ. (You have priorities.)'},\n    darkweb:{title:'Dark Web',glyph:'☠',msg:'3 sellers online. Proceed at your own risk. Grandma would not approve.'},\n    wallet:{title:'Wallet',glyph:'▤',msg:'Balance is live in the taskbar. Cold storage: a sticky note somewhere.'},\n    files:{title:'Files',glyph:'▦',msg:'12 files found. Mostly screenshots of losses and one blurry seed phrase.'},\n    chudmail:{title:'ChudMail',glyph:'✉',msg:'47 unread. All of them scams. One is from grandma. It is also a scam.'},\n    gamble:{title:'Gamble',glyph:'☈',msg:'Double or nothing. [ LOCKED — deposit 1.00 DGENZ to unlock your doom ]'}\n  };\n  order = ['degenfun','chirper','internet','darkweb','wallet','files','chudmail','gamble'];\n\n  state = {\n    theme: (this.props && this.props.theme) || 'dark',\n    coins: this.makeCoins(),\n    selectedCoin: 'cmr',\n    buyAmount: '2.00',\n    balance: 5.00,\n    walletHist: this.genHist(5, true),\n    clock: '',\n    startOpen: false,\n    toasts: [],\n    maxZ: 6,\n    windows: {\n      degenfun:{open:true,min:false,max:false,x:148,y:58,w:776,h:552,z:6,restore:null},\n      chirper:{open:true,min:false,max:false,x:650,y:152,w:392,h:520,z:5,restore:null},\n      internet:{open:false,min:false,max:false,x:230,y:120,w:300,h:212,z:0,restore:null},\n      darkweb:{open:false,min:false,max:false,x:270,y:158,w:322,h:224,z:0,restore:null},\n      wallet:{open:false,min:false,max:false,x:310,y:138,w:300,h:206,z:0,restore:null},\n      files:{open:false,min:false,max:false,x:250,y:186,w:304,h:206,z:0,restore:null},\n      chudmail:{open:false,min:false,max:false,x:290,y:124,w:312,h:214,z:0,restore:null},\n      gamble:{open:false,min:false,max:false,x:330,y:170,w:304,h:214,z:0,restore:null}\n    }\n  };\n\n  genHist(price, up){\n    const arr=[]; let v=price*(up?0.55:1.5);\n    for(let i=0;i<26;i++){ v += (price-v)*0.09 + (Math.random()-0.5)*price*0.06; arr.push(Math.max(v,price*0.05)); }\n    arr[arr.length-1]=price; return arr;\n  }\n\n  makeCoins(){\n    return [\n      {id:'grump',name:'Grumpy Coin',ticker:'GRUMP',price:0.0421,change:412,mcap:'$4.2M',up:true,badge:'HOT'},\n      {id:'cmr',name:'Chad Rocket',ticker:'CMR',price:0.0067,change:125,mcap:'$1.1M',up:true},\n      {id:'dhd',name:'Doge Hard Die',ticker:'DHD',price:0.0189,change:67,mcap:'$890K',up:true},\n      {id:'hodl',name:'HODL Grandma',ticker:'HODL',price:0.0952,change:289,mcap:'$6.8M',up:true},\n      {id:'wojak',name:'Wojak Feels',ticker:'WOJAK',price:0.0031,change:-42,mcap:'$210K',up:false,rug:true}\n    ].map(c=>({...c, hist:this.genHist(c.price,c.up)}));\n  }\n\n  componentDidMount(){\n    this.setState({clock:this.fmtClock()});\n    this._clock=setInterval(()=>this.setState({clock:this.fmtClock()}),1000);\n    if(!this.props || this.props.livePrices!==false){ this._px=setInterval(()=>this.tick(),1500); }\n    this._move=(e)=>this.onMove(e);\n    this._up=()=>this.onUp();\n    window.addEventListener('mousemove',this._move);\n    window.addEventListener('mouseup',this._up);\n  }\n  componentWillUnmount(){\n    clearInterval(this._clock); clearInterval(this._px);\n    window.removeEventListener('mousemove',this._move);\n    window.removeEventListener('mouseup',this._up);\n  }\n\n  fmtClock(){\n    const d=new Date(); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0');\n    const ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap;\n  }\n\n  tick(){\n    this.setState(s=>({coins:s.coins.map(c=>{\n      const last=c.hist[c.hist.length-1];\n      const drift = c.rug ? -last*0.018 : (c.up? last*0.004 : -last*0.004);\n      let nv = last + drift + (Math.random()-0.5)*last*0.05;\n      nv=Math.max(nv, c.price*0.02);\n      const hist=[...c.hist.slice(1), nv];\n      let change = c.change + (nv-last)/c.price*100*0.5;\n      if(c.rug) change=Math.min(change,-8);\n      change=Math.max(-96,Math.min(9999,change));\n      return {...c, hist, price:nv, change};\n    })}));\n  }\n\n  // ---- windows ----\n  focus(id){ this.setState(s=>{const z=s.maxZ+1; return {maxZ:z, windows:{...s.windows,[id]:{...s.windows[id],z}}};}); }\n  updateWin(id,patch){ this.setState(s=>({windows:{...s.windows,[id]:{...s.windows[id],...patch}}})); }\n  openApp(id){ this.setState(s=>{const z=s.maxZ+1; return {maxZ:z, startOpen:false, windows:{...s.windows,[id]:{...s.windows[id],open:true,min:false,z}}};}); }\n  close(id){ this.updateWin(id,{open:false}); }\n  toggleMin(id){ const willMin=!this.state.windows[id].min; this.updateWin(id,{min:willMin}); if(!willMin) this.focus(id); }\n  toggleMax(id){\n    const w=this.state.windows[id];\n    if(w.max){ this.updateWin(id,{x:w.restore.x,y:w.restore.y,w:w.restore.w,h:w.restore.h,max:false,restore:null}); }\n    else { this.updateWin(id,{x:12,y:12,w:window.innerWidth-24,h:window.innerHeight-52-24,max:true,restore:{x:w.x,y:w.y,w:w.w,h:w.h}}); }\n    this.focus(id);\n  }\n  getTop(){ let top=null,z=-1; const ws=this.state.windows; for(const id in ws){ const w=ws[id]; if(w.open&&!w.min&&w.z>z){z=w.z;top=id;} } return top; }\n\n  beginDrag(id,e){ e.preventDefault(); this.focus(id); const w=this.state.windows[id]; this.drag={id,ox:e.clientX-w.x,oy:e.clientY-w.y}; document.body.style.userSelect='none'; }\n :'11.5px',fontWeight:600,padding:'3px 7px',borderRadius:'6px',fontVariantNumeric:'tabular-nums',color:col,background:bg},\n        sparkPts:this.spark(c.hist,64,24),\n        sparkColor:col,\n        hasBadge,\n        badgeText: c.rug?'RUG':c.badge,\n        badgeStyle: c.rug\n          ? {fontFamily:\"'IBM Plex Mono',ui-monospace,monospace\",fontSize:'8.5px',fontWeight:700,letterSpacing:'.08em',color:'var(--red,#F5566E)',border:'1px solid var(--red,#F5566E)',borderRadius:'5px',padding:'1px 5px',animation:'pulse 1.1s infinite'}\n          : {fontFamily:\"'IBM Plex Mono',ui-monospace,monospace\",fontSize:'8.5px',fontWeight:700,letterSpacing:'.08em',color:'#100B14',background:'var(--gold,#F5B02E)',borderRadius:'5px',padding:'1px 5px'},\n        rowStyle:{display:'grid',gridTemplateColumns:'1.75fr .9fr .9fr .85fr 76px',gap:'8px',alignItems:'center',padding:'10px 15px',borderBottom:'1px solid var(--border)',cursor:'pointer', ...(sel?{background:'rgba(245,176,46,.09)',boxShadow:'inset 2px 0 0 var(--gold)'}:{})},\n        onSelect:()=>this.setState({selectedCoin:c.id})\n      };\n    });\n\n    const scRaw=this.selCoinObj();\n    const scUp=scRaw.change>=0;\n    const selChangeStyle={fontFamily:\"'IBM Plex Mono',ui-monospace,monospace\",fontSize:'12px',fontWeight:600,color:scUp?'var(--green,#34D399)':'var(--red,#F5566E)',fontVariantNumeric:'tabular-nums'};\n\n    const posts=[\n      {name:'Rug Pull Randy',handle:'rugpull_randy',followers:'12.4K',avatar:'R',shill:true,pre:'aped my grandma fund into ',tag:'$HODL',post:' — this is the one anon. wagmi 🚀',likes:'892',reposts:'204'},\n      {name:'Giga GM',handle:'gigachad_gm',followers:'88.2K',avatar:'G',shill:false,pre:'',tag:'$GRUMP',post:' is the only coin with real utility (making me rich)',likes:'4.2K',reposts:'1.1K'},\n      {name:'Trench Mommy',handle:'trenchmommy',followers:'24.9K',avatar:'T',shill:false,pre:'sold a kidney, bought the dip on ',tag:'$CMR',post:'. gm degens ☕',likes:'1.7K',reposts:'340'},\n      {name:
