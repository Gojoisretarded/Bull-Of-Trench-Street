<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta charset="utf-8">
<title>Bull of Trench Street — $BOTS Shell Prototype</title>
<style>
  :root{
    /* fine matte blue — Bull of Trench Street. --gold var name kept = accent (now blue) */
    --ground:#0A0F16; --surface:#121924; --surface-2:#19222F; --surface-3:#22303F;
    --line:#273545; --line-soft:#1B2532; --ink:#E7ECF3; --muted:#8896A8; --faint:#586472;
    --gold:#4F8FE6; --gold-dim:#3B6FB8; --gold-ink:#07101C;
    --green:#34D399; --red:#F5566E; --brand:#4F8FE6; --blue:#5C8DF0;
    --glow:rgba(79,143,230,.15);
    --mono:ui-monospace,"Cascadia Code","SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --tb:38px;
    --ease:cubic-bezier(.22,1,.36,1);
    --blur:blur(18px) saturate(1.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--ground);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none}
  button{font-family:inherit;color:inherit;border:0;background:none;cursor:pointer;padding:0}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(154,143,170,.22);border-radius:6px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(154,143,170,.4);background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  #app{position:fixed;inset:0}

  /* ================= WALLPAPER ================= */
  #desktop{position:absolute;inset:0;overflow:hidden;background:#0D0911}
  #wall{position:absolute;inset:0;pointer-events:none;transition:filter .35s var(--ease),transform .35s var(--ease)}
  #wall .sky{position:absolute;inset:0;
    background:
      radial-gradient(90% 65% at 50% 30%, rgba(79,143,230,.15), transparent 60%),
      radial-gradient(70% 55% at 85% 100%, rgba(52,211,153,.06), transparent 55%),
      linear-gradient(180deg,#0E1622 0%,#0A0F16 55%,#070B11 100%);}
  #wall svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  #wall .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
    background-image:repeating-linear-gradient(0deg,#000 0,#000 1px,transparent 1px,transparent 3px)}
  .ov #wall{filter:brightness(.45) blur(6px);transform:scale(1.03)}

  /* ================= TOP BAR ================= */
  #topbar{position:absolute;top:0;left:0;right:0;height:var(--tb);z-index:10005;display:flex;align-items:center;
    padding:0 10px;gap:6px;background:color-mix(in srgb,#14101B 72%,transparent);
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid rgba(50,38,65,.6)}
  .tbtn{display:flex;align-items:center;gap:7px;height:28px;padding:0 12px;border-radius:99px;
    font-family:var(--mono);font-size:11.5px;color:var(--muted);transition:background .15s,color .15s}
  .tbtn:hover{background:rgba(255,255,255,.07);color:var(--ink)}
  .tbtn:active{transform:scale(.96)}
  .tbtn.on{background:var(--surface-3);color:var(--gold)}
  #tb-clock{position:absolute;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:var(--ink);
    height:28px;display:flex;align-items:center;gap:10px;padding:0 14px;border-radius:99px;font-variant-numeric:tabular-nums}
  #tb-clock .d{color:var(--muted)}
  #tb-right{margin-left:auto;display:flex;align-items:center;gap:4px}
  #tb-bal{color:var(--gold);font-weight:700}

  /* ================= DOCK ================= */
  #dockwrap{position:absolute;left:0;right:0;bottom:10px;display:flex;justify-content:center;z-index:10004;pointer-events:none}
  #dock{pointer-events:auto;display:flex;align-items:flex-end;gap:6px;padding:8px 12px;border-radius:20px;
    background:color-mix(in srgb,#17121E 70%,transparent);border:1px solid rgba(50,38,65,.7);
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
    box-shadow:0 18px 40px -12px rgba(0,0,0,.6)}
  .dk{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;
    width:48px;transition:width .18s var(--ease)}
  .dk .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;
    transform-origin:bottom center;transition:transform .16s var(--ease),filter .16s;will-change:transform}
  .dk .ic svg{width:100%;height:100%;display:block}
  .dk:hover .ic{filter:drop-shadow(0 9px 18px rgba(0,0,0,.6))}
  .dk:active .ic{transform:scale(.92)!important}
  .dk .dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s}
  .dk.run .dot{background:var(--gold)}
  .dk .tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);
    font-family:var(--mono);font-size:10.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);
    padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s}
  .dk:hover .tip{opacity:1;transform:translateX(-50%)}
  .dk.sep{width:1px;height:40px;background:var(--line);margin:0 4px;align-self:center}

  /* ================= WINDOWS ================= */
  .win{position:absolute;top:0;left:0;display:flex;flex-direction:column;background:var(--surface);
    border:1px solid var(--line);border-radius:13px;overflow:hidden;transform-origin:top left;will-change:transform;
    box-shadow:0 14px 44px -10px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.25);
    transition:box-shadow .2s,border-color .2s}
  .win.focused{border-color:color-mix(in srgb,var(--gold) 34%,var(--line));
    box-shadow:0 26px 70px -12px rgba(0,0,0,.75),0 0 0 1px var(--glow)}
  .win.opening{animation:winIn .26s var(--ease)}
  .win.closing{animation:winOut .16s ease forwards}
  @keyframes winIn{from{opacity:0;transform:var(--geo,none) scale(.92)}to{opacity:1;transform:var(--geo,none) scale(1)}}
  @keyframes winOut{to{opacity:0;transform:var(--geo,none) scale(.95)}}
  .win.dragging,.win.resizing{transition:none!important;cursor:grabbing}
  .win.anim{transition:transform .3s var(--ease),width .22s var(--ease),height .22s var(--ease),opacity .28s ease}
  .headerbar{height:40px;flex:0 0 auto;display:flex;align-items:center;padding:0 8px 0 14px;cursor:grab;gap:10px;
    background:linear-gradient(var(--surface-2),color-mix(in srgb,var(--surface-2) 60%,var(--surface)));
    border-bottom:1px solid var(--line-soft);touch-action:none}
  .headerbar:active{cursor:grabbing}
  .hb-t{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:9px;color:var(--muted);transition:color .2s}
  .win.focused .hb-t{color:var(--ink)}
  .hb-t .gli{width:17px;height:17px;display:inline-flex;flex:0 0 auto}
  .hb-t .gli svg{width:100%;height:100%}
  .hb-c{margin-left:auto;display:flex;gap:4px}
  .wbtn{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:var(--muted);
    transition:background .13s,color .13s,transform .1s}
  .wbtn:hover{background:rgba(255,255,255,.09);color:var(--ink)}
  .wbtn:active{transform:scale(.9)}
  .wbtn.cl:hover{background:var(--brand);color:#fff}
  .wbtn svg{width:12px;height:12px}
  .win-body{flex:1 1 auto;overflow:auto;-webkit-overflow-scrolling:touch;position:relative}
  .resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;touch-action:none;z-index:5}

  /* overview mode */
  .ov .win .win-body,.ov .win .headerbar,.ov .win .resize{pointer-events:none}
  .ov .win{cursor:pointer}
  .ov .win:hover{border-color:var(--gold)}

  /* snap preview */
  #snap{position:absolute;pointer-events:none;z-index:9998;border:1.5px solid var(--gold);border-radius:13px;
    background:var(--glow);opacity:0;transition:opacity .12s,transform .12s var(--ease);transform-origin:top left}
  #snap.on{opacity:1}

  /* ================= LAUNCHER (app grid) ================= */
  #grid{position:absolute;inset:0;z-index:10010;display:none;flex-direction:column;align-items:center;padding-top:9vh;gap:26px;
    background:color-mix(in srgb,#0D0911 66%,transparent);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  #grid.on{display:flex;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  #gsearch{width:min(420px,86vw);background:var(--surface);border:1px solid var(--line);border-radius:99px;
    padding:12px 20px;color:var(--ink);font-family:var(--mono);font-size:13px;user-select:text}
  #gapps{display:grid;grid-template-columns:repeat(4,110px);gap:18px;justify-content:center}
  .ga{display:flex;flex-direction:column;align-items:center;gap:9px;padding:14px 6px;border-radius:16px;
    transition:background .14s,transform .1s;animation:gaIn .3s var(--ease) both}
  @keyframes gaIn{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1}}
  .ga:hover{background:rgba(255,255,255,.06)}
  .ga:active{transform:scale(.94)}
  .ga .ic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center}
  .ga .ic svg{width:100%;height:100%;display:block}
  .ga .l{font-family:var(--mono);font-size:11px;color:var(--ink)}

  /* ================= TOASTS (top-center, GNOME style) ================= */
  #toasts{position:absolute;top:calc(var(--tb) + 10px);left:50%;transform:translateX(-50%);z-index:10011;
    display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{font-family:var(--mono);font-size:12px;padding:10px 18px;background:color-mix(in srgb,var(--surface) 88%,transparent);
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
    border:1px solid var(--line);border-radius:99px;box-shadow:0 12px 34px rgba(0,0,0,.5);animation:ntIn .28s var(--ease);
    display:flex;align-items:center;gap:9px}
  .toast::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .toast.good::before{background:var(--green)} .toast.bad::before{background:var(--brand)} .toast.sell::before{background:var(--red)}
  @keyframes ntIn{from{opacity:0;transform:translateY(-14px) scale(.96)}to{opacity:1}}

  /* ================= APP CONTENT ================= */
  .pad{padding:16px}
  .flavor{padding:24px;font-family:var(--mono);font-size:13px;color:var(--muted);line-height:1.7}
  .flavor .fbig{width:46px;height:46px;display:block;margin-bottom:12px}
  .flavor .fbig svg{width:100%;height:100%}
  .coin{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:11px 14px;
    border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .1s}
  .coin:hover{background:var(--surface-2)} .coin.sel{background:var(--surface-2);box-shadow:inset 3px 0 0 var(--gold)}
  .coin .nm{font-weight:700;font-size:14px} .coin .tk{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .coin canvas{display:block}
  .coin .pr{font-family:var(--mono);font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
  .coin .ch{font-family:var(--mono);font-size:11px;text-align:right}
  .up{color:var(--green)} .down{color:var(--red)}
  .buypanel{padding:14px;border-top:1px solid var(--line);background:var(--surface-2);display:flex;flex-direction:column;gap:10px}
  .buypanel .row{display:flex;gap:8px;align-items:center}
  .buypanel input{flex:1;background:var(--ground);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);
    font-family:var(--mono);font-size:13px;user-select:text}
  .btn{padding:9px 14px;border-radius:9px;font-family:var(--mono);font-size:12px;font-weight:700;transition:transform .07s,filter .12s}
  .btn:active{transform:scale(.95)} .btn:hover{filter:brightness(1.1)}
  .btn.buy{background:var(--green);color:#06231a} .btn.sell{background:var(--red);color:#2a0810}
  .btn.ghost{background:var(--surface-3);color:var(--ink);border:1px solid var(--line)}
  .btn.gold{background:var(--gold);color:var(--gold-ink)}
  .feed{display:flex;flex-direction:column}
  .post{padding:13px 15px;border-bottom:1px solid var(--line-soft);animation:ntIn .2s ease}
  .post .ph{display:flex;gap:8px;align-items:center;margin-bottom:5px}
  .post .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--brand));
    display:grid;place-items:center;font-size:12px;color:#000;font-weight:700}
  .post .un{font-weight:700;font-size:13px} .post .hd{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .post .bd{font-size:13.5px;line-height:1.5} .post .bd .cash{color:var(--gold);font-weight:600}
  .composer{position:sticky;top:0;z-index:2;padding:12px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;gap:8px}
  .composer input{flex:1;background:var(--ground);border:1px solid var(--line);border-radius:20px;padding:9px 14px;color:var(--ink);font-size:13px;user-select:text}

  /* terminal */
  .term{height:100%;background:#0B080F;padding:12px 14px;font-family:var(--mono);font-size:12.5px;line-height:1.65;
    overflow:auto;cursor:text}
  .term .ln{white-space:pre-wrap;word-break:break-word}
  .term .p{color:var(--green)} .term .g{color:var(--gold)} .term .dim{color:var(--faint)} .term .r{color:var(--red)}
  .term input{background:none;border:0;color:var(--ink);font:inherit;width:60%;user-select:text}
  .term input:focus{outline:none}

  /* ================= BOOT / LOGIN ================= */
  #boot,#login{position:absolute;inset:0;z-index:20000;background:var(--ground);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px}
  #boot.hide,#login.hide{opacity:0;pointer-events:none;transition:opacity .5s}
  .logo{font-family:var(--mono);font-weight:800;letter-spacing:-.02em;font-size:clamp(34px,7vw,60px)}
  .logo .b{color:var(--gold)}
  .bootlog{font-family:var(--mono);font-size:12px;color:var(--muted);width:min(460px,88vw);height:140px;overflow:hidden;line-height:1.75}
  .bootlog .ok{color:var(--green)}
  .bar{width:min(460px,88vw);height:4px;background:var(--surface-2);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--brand));border-radius:4px;transition:width .2s}
  #login{gap:20px;background:
    radial-gradient(110% 75% at 72% -8%, rgba(245,176,46,.12), transparent 55%),
    radial-gradient(80% 60% at 12% 108%, rgba(255,77,77,.08), transparent 55%),var(--ground)}
  #lclock{font-family:var(--mono);font-size:clamp(40px,8vw,64px);font-weight:700;letter-spacing:-.03em}
  #ldate{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:-14px}
  #login h2{font-weight:800;font-size:clamp(20px,3.4vw,26px);margin:14px 0 0;letter-spacing:-.02em}
  #login .sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:-8px}
  .roster{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:min(880px,92vw);margin-top:8px}
  .pick{border:1px solid var(--line);border-radius:16px;background:color-mix(in srgb,var(--surface) 80%,transparent);
    padding:18px;cursor:pointer;display:flex;flex-direction:column;gap:8px;
    transition:transform .15s var(--ease),border-color .15s,box-shadow .15s}
  .pick:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 18px 40px -12px rgba(0,0,0,.6)}
  .pick.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 18px 40px -12px rgba(0,0,0,.6)}
  .pick .em{font-size:26px} .pick h3{font-size:16px;margin:0}
  .pick .tag{font-family:var(--mono);font-size:10px;color:var(--brand);text-transform:uppercase;letter-spacing:.05em}
  .pick p{font-size:12px;color:var(--muted);margin:0;line-height:1.5}
  .pick .bag{font-family:var(--mono);font-size:12px;color:var(--gold);margin-top:auto;padding-top:8px;border-top:1px solid var(--line-soft)}
  #enter{padding:13px 30px;border-radius:99px;background:var(--gold);color:var(--gold-ink);font-family:var(--mono);
    font-weight:700;font-size:13px;opacity:.35;pointer-events:none;transition:opacity .15s,transform .08s}
  #enter.ready{opacity:1;pointer-events:auto} #enter:active{transform:scale(.96)}

  /* ================= MOBILE ================= */
  @media (max-width:720px){
    .win{border-radius:0!important;border-left:0;border-right:0}
    .resize{display:none}
    .headerbar{cursor:default}
    .roster{grid-template-columns:1fr 1fr;gap:10px}
    #gapps{grid-template-columns:repeat(3,96px);gap:10px}
    #tb-clock{position:static;transform:none;margin-left:auto}
    #tb-right{margin-left:0}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;transition-duration:.05s!important}
  }
</style>
</head><body>

<div id="app">
  <div id="desktop">
    <div id="wall">
      <div class="sky"></div>
      <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <radialGradient id="disc" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#4F8FE6" stop-opacity=".22"/>
            <stop offset="55%" stop-color="#4F8FE6" stop-opacity=".05"/>
            <stop offset="100%" stop-color="#4F8FE6" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="carea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#34D399" stop-opacity=".28"/>
            <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="bullg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#8FB6E8"/><stop offset="1" stop-color="#3B6FB8"/>
          </linearGradient>
        </defs>
        <circle cx="720" cy="360" r="380" fill="url(#disc)"/>
        <!-- stars -->
        <g fill="#9FB6D6">
          <circle cx="180" cy="130" r="1.5" opacity=".5"/><circle cx="360" cy="90" r="1" opacity=".35"/>
          <circle cx="540" cy="180" r="1.4" opacity=".45"/><circle cx="980" cy="120" r="1.2" opacity=".4"/>
          <circle cx="1180" cy="90" r="1.6" opacity=".5"/><circle cx="1300" cy="200" r="1" opacity=".3"/>
          <circle cx="1080" cy="230" r="1.3" opacity=".4"/><circle cx="240" cy="260" r="1.1" opacity=".3"/>
        </g>
        <!-- BULL EMBLEM (placeholder — swap for the mascot later) -->
        <g transform="translate(720,360)" opacity=".16" fill="none" stroke="url(#bullg)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M-88,-52 C-150,-92 -196,-52 -196,-128 C-150,-108 -120,-92 -96,-72"/>
          <path d="M88,-52 C150,-92 196,-52 196,-128 C150,-108 120,-92 96,-72"/>
          <path d="M-96,-72 C-92,26 -52,104 0,118 C52,104 92,26 96,-72 C52,-44 -52,-44 -96,-72 Z"/>
          <circle cx="-44" cy="-8" r="3"/><circle cx="44" cy="-8" r="3"/>
          <path d="M-20,58 h40"/>
        </g>
        <!-- rising chart -->
        <path d="M0,690 L170,650 L320,662 L470,590 L640,612 L800,520 L980,552 L1160,440 L1320,472 L1440,392 L1440,900 L0,900 Z" fill="url(#carea)"/>
        <path d="M0,690 L170,650 L320,662 L470,590 L640,612 L800,520 L980,552 L1160,440 L1320,472 L1440,392" fill="none" stroke="#34D399" stroke-width="2.5" opacity=".6"/>
        <!-- skyline (Wall / Trench Street) -->
        <g fill="#0C1420">
          <rect x="60" y="640" width="70" height="260"/><rect x="150" y="700" width="52" height="200"/>
          <rect x="230" y="600" width="84" height="300"/><rect x="330" y="690" width="60" height="210"/>
          <rect x="1050" y="620" width="78" height="280"/><rect x="1150" y="690" width="56" height="210"/>
          <rect x="1230" y="650" width="90" height="250"/><rect x="1340" y="700" width="60" height="200"/>
        </g>
        <g fill="#0E1826">
          <rect x="420" y="720" width="66" height="180"/><rect x="510" y="680" width="80" height="220"/>
          <rect x="610" y="730" width="54" height="170"/><rect x="760" y="700" width="72" height="200"/>
          <rect x="860" y="740" width="60" height="160"/><rect x="940" y="700" width="64" height="200"/>
        </g>
      </svg>
      <div class="grain"></div>
    </div>

    <div id="snap"></div>
    <div id="toasts"></div>

    <div id="topbar">
      <button class="tbtn" id="ovbtn" title="Overview">⌘ Overview</button>
      <button class="tbtn" id="gridbtn2" title="Applications">⠿ Apps</button>
      <div id="tb-clock"><span id="tb-time">--:--</span><span class="d" id="tb-date"></span></div>
      <div id="tb-right">
        <button class="tbtn" id="mutebtn" title="Sound">♪</button>
        <span class="tbtn" style="pointer-events:none" id="tb-bal">--</span>
        <button class="tbtn" id="powerbtn" title="Log off">⏻</button>
      </div>
    </div>

    <div id="dockwrap"><div id="dock"></div></div>

    <div id="grid">
      <input id="gsearch" placeholder="Type to search the trenches…">
      <div id="gapps"></div>
    </div>
  </div>

  <div id="boot">
    <div class="logo">Bull of <span class="b">Trench Street</span></div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:.28em;margin-top:-14px">$BOTS</div>
    <div class="bootlog" id="bootlog"></div>
    <div class="bar"><i id="bootbar"></i></div>
  </div>

  <div id="login" class="hide">
    <div id="lclock">--:--</div>
    <div id="ldate"></div>
    <h2>Choose your degen</h2>
    <div class="sub">// same trenches — different come-up</div>
    <div class="roster" id="roster"></div>
    <button id="enter">ENTER THE TRENCHES →</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const isMobile=()=>matchMedia('(max-width:720px)').matches;
  const TB=38;

  /* ---------- sound ---------- */
  let AC=null,muted=false;
  function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(f,d,t,v){ if(muted)return; const c=ac(); if(!c)return;
    const o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f;
    g.gain.value=0; o.connect(g); g.connect(c.destination);
    const n=c.currentTime; g.gain.linearRampToValueAtTime(v||.05,n+.006);
    g.gain.exponentialRampToValueAtTime(.0001,n+(d||.09)); o.start(n); o.stop(n+(d||.09)+.02); }
  const sfx={
    click:()=>beep(520,.05,'triangle',.04),
    open:()=>{beep(440,.08,'sine',.05);setTimeout(()=>beep(660,.09,'sine',.05),60);},
    close:()=>{beep(400,.07,'sine',.045);setTimeout(()=>beep(280,.09,'sine',.045),55);},
    err:()=>beep(150,.16,'sawtooth',.05),
    coin:()=>{beep(720,.06,'square',.035);setTimeout(()=>beep(960,.09,'square',.035),55);},
    tap:()=>beep(340,.04,'triangle',.03),
    ov:()=>beep(560,.07,'sine',.04)
  };

  /* ============================================================
     WORLD CONFIG — rebrand your token in ONE place.
     When you launch your own coin, change these three strings.
     ============================================================ */
  const W={ os:'Bull of Trench Street', name:'Bull Bucks', sym:'BOTS', ticker:'$BOTS' };

  /* ---------- config ---------- */
  const APPS={
    degenfun:{title:'Degen.Fun'}, chirper:{title:'Chirper'},
    wallet:{title:'Wallet'}, terminal:{title:'Terminal'},
    darkweb:{title:'Dark Web'}, files:{title:'Files'},
    chudmail:{title:'ChudMail'}, gamble:{title:'Gamble'},
    internet:{title:'Internet'}
  };
  const DOCK_APPS=['degenfun','chirper','wallet','terminal','darkweb'];
  const FLAVOR={
    internet:`NET_LINK severed. Reconnect fee: 0.50 ${W.sym}. You have... priorities.`,
    darkweb:'3 sellers online. Proceed at your own risk. Grandma would not approve of tab #2.',
    files:'12 files found. Mostly screenshots of losses and one blurry seed phrase.',
    chudmail:'47 unread. All scams. One is from grandma. It is also a scam.',
    gamble:`Double or nothing. [ LOCKED — deposit 1.00 ${W.sym} to unlock your doom ]`
  };

  /* ---------- app icons (hand-drawn SVG squircles) ---------- */
  function ICON(id){
    const G=(k,a,b)=>`<defs><linearGradient id="g-${k}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${a}"/><stop offset="1" stop-color="${b}"/></linearGradient></defs>`;
    const T=k=>`<rect x="2" y="2" width="44" height="44" rx="11" fill="url(#g-${k})"/><rect x="2" y="2" width="44" height="44" rx="11" fill="none" stroke="rgba(255,255,255,.08)"/>`;
    const S={
      degenfun:G('df','#232B38','#11161F')+T('df')
        +'<path d="M13.5 14v20M24 10v22M34.5 16v22" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>'
        +'<rect x="10.5" y="19" width="6" height="10" rx="1.3" fill="#34D399"/>'
        +'<rect x="21" y="14" width="6" height="12" rx="1.3" fill="#F5566E"/>'
        +'<rect x="31.5" y="22" width="6" height="11" rx="1.3" fill="#34D399"/>',
      chirper:G('ch','#57A8F2','#2D6FD8')+T('ch')
        +'<path d="M35.5 15.5l3.5-1.8-2.2 4.1c.6 7.9-4.6 14.8-13 14.8-3.3 0-6.2-1-8.3-2.6 2.9.2 5.5-.6 7.3-2.1-2.5-.4-4.5-2-5.3-4.1.9.2 1.7.2 2.6-.1-2.8-.8-4.6-3-4.6-5.8.8.4 1.7.7 2.6.8-2.4-1.9-3.1-5.1-1.6-7.6 2.8 3.3 6.9 5.5 11.4 5.8-.7-3.1 1.6-5.9 4.7-5.9 1.4 0 2.6.6 3.5 1.5z" fill="#fff"/>',
      wallet:G('wa','#9A6A33','#6B4320')+T('wa')
        +'<rect x="9" y="14" width="30" height="21" rx="4" fill="#F5EDE2"/>'
        +'<rect x="9" y="14" width="30" height="6.5" rx="3.2" fill="#E4D3BB"/>'
        +'<rect x="26.5" y="21" width="12.5" height="9.5" rx="2.6" fill="#8A5A2B"/>'
        +'<circle cx="31" cy="25.8" r="1.9" fill="#F5B02E"/>',
      terminal:G('te','#242932','#0F1216')+T('te')
        +'<path d="M12 17l8 7-8 7" stroke="#34D399" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
        +'<rect x="24" y="28.6" width="11" height="3.2" rx="1.5" fill="#34D399"/>',
      darkweb:G('dw','#3A161C','#1B0A0E')+T('dw')
        +'<path d="M24 9.5c-7.2 0-12.2 5.1-12.2 11.7 0 4 2 7.1 5 9.1v3.4c0 1.2.9 2.1 2.1 2.1h10.2c1.2 0 2.1-.9 2.1-2.1v-3.4c3-2 5-5.1 5-9.1 0-6.6-5-11.7-12.2-11.7z" fill="#EDE7F2"/>'
        +'<circle cx="18.8" cy="21.5" r="3.1" fill="#1B0A0E"/><circle cx="29.2" cy="21.5" r="3.1" fill="#1B0A0E"/>'
        +'<path d="M21.8 28.5h4.4L24 32.4z" fill="#1B0A0E"/>',
      files:G('fi','#F2B33D','#DE8F1F')+T('fi')
        +'<path d="M10 16.5c0-1.4 1.1-2.5 2.5-2.5h8l3.5 4h11.5c1.4 0 2.5 1.1 2.5 2.5v13c0 1.4-1.1 2.5-2.5 2.5h-23a2.5 2.5 0 0 1-2.5-2.5z" fill="#FFF6E8"/>'
        +'<path d="M10 22.5h28v11c0 1.4-1.1 2.5-2.5 2.5h-23a2.5 2.5 0 0 1-2.5-2.5z" fill="#FFE9C2"/>',
      chudmail:G('cm','#5C8DF0','#3B63C4')+T('cm')
        +'<rect x="9" y="15" width="30" height="19.5" rx="3.2" fill="#fff"/>'
        +'<path d="M10 16.8L24 27l14-10.2" stroke="#3B63C4" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
      gamble:G('gb','#7C4DD8','#5228A8')+T('gb')
        +'<rect x="12" y="12" width="24" height="24" rx="6.5" fill="#fff"/>'
        +'<circle cx="18.7" cy="18.7" r="2.2" fill="#5228A8"/><circle cx="29.3" cy="18.7" r="2.2" fill="#5228A8"/>'
        +'<circle cx="24" cy="24" r="2.2" fill="#5228A8"/>'
        +'<circle cx="18.7" cy="29.3" r="2.2" fill="#5228A8"/><circle cx="29.3" cy="29.3" r="2.2" fill="#5228A8"/>',
      internet:G('in','#3E7BE8','#2452B0')+T('in')
        +'<circle cx="24" cy="24" r="13" fill="none" stroke="#fff" stroke-width="2"/>'
        +'<ellipse cx="24" cy="24" rx="5.8" ry="13" fill="none" stroke="#fff" stroke-width="2"/>'
        +'<path d="M11.6 19.8h24.8M11.6 28.2h24.8" stroke="#fff" stroke-width="2"/>',
      apps:G('ap','#3A3344','#251F30')+T('ap')
        +[16,24,32].map(y=>[16,24,32].map(x=>`<circle cx="${x}" cy="${y}" r="2.4" fill="#EDE7F2"/>`).join('')).join('')
    };
    return `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${S[id]||S.apps}</svg>`;
  }
  const CHARS=[
    {id:'orphan',em:'🕊️',name:'The Orphan',tag:'the canon',bag:5.00,desc:'Buried both parents. $5k in SOL is all that’s left. Refuses to quit.'},
    {id:'fumbler',em:'😤',name:'The Fumbler',tag:'redemption',bag:2.00,desc:'Paper-handed a 100x at 2x. Hunting the trade that makes it right.'},
    {id:'nepo',em:'💰',name:'The Nepo',tag:'prove it',bag:50.00,desc:'Daddy’s allowance. Rich, but nobody respects it. Earn the trenches.'},
    {id:'addict',em:'🎰',name:'The Addict',tag:'high tension',bag:0.80,desc:'One last win, he swears. Trading the rent money. Brutal.'}
  ];

  /* ---------- state ---------- */
  const S={balance:5,z:10,chosen:null,ov:false,wins:{},sel:'cmr',
    coins:[
      {id:'grump',nm:'Grumpy Coin',tk:'GRUMP',price:.0421,ch:412,up:true,hist:hist(.0421,true)},
      {id:'cmr',nm:'Chad Rocket',tk:'CMR',price:.0067,ch:125,up:true,hist:hist(.0067,true)},
      {id:'dhd',nm:'Doge Hard Die',tk:'DHD',price:.0189,ch:67,up:true,hist:hist(.0189,true)},
      {id:'hodl',nm:'Hodl Please',tk:'HODL',price:.0031,ch:289,up:true,hist:hist(.0031,true)},
      {id:'wojak',nm:'Wojak Tears',tk:'WOJAK',price:.00069,ch:-42,up:false,rug:true,hist:hist(.00069,false)}
    ]};
  function hist(p,up){const a=[];let v=p*(up?.6:1.4);for(let i=0;i<28;i++){v+=(p-v)*.08+(Math.random()-.5)*p*.06;a.push(Math.max(v,p*.05));}a[a.length-1]=p;return a;}

  /* ---------- boot ---------- */
  const BLOG=[
    '[  OK  ] Mounted /wallet.',
    '[  OK  ] Started Market Feed Daemon.',
    '[  OK  ] Reached target Rock Bottom.',
    '[  OK  ] Started Hopium Calibration Service.',
    '[FAILED] Failed to start Financial Advice. (unit not found)',
    '[  OK  ] Connected to Trench Street.',
    'Bull of Trench Street v0.3 (degen/stable) ready.'
  ];
  function runBoot(){
    const log=$('#bootlog'),bar=$('#bootbar');let i=0;
    (function step(){
      if(i<BLOG.length){
        const line=BLOG[i]
          .replace('[  OK  ]','[<span class="ok">  OK  </span>]')
          .replace('[FAILED]','[<span style="color:var(--red)">FAILED</span>]');
        log.innerHTML+='<div>'+line+'</div>';
        bar.style.width=Math.round(((i+1)/BLOG.length)*100)+'%';
        beep(300+i*40,.05,'square',.025);
        i++; setTimeout(step,reduce?50:240);
      } else setTimeout(()=>{ $('#boot').classList.add('hide'); showLogin(); },480);
    })();
  }

  /* ---------- login ---------- */
  function showLogin(){
    lclock();
    const r=$('#roster');
    CHARS.forEach(c=>{
      const el=document.createElement('div');el.className='pick';
      el.innerHTML=`<div class="em">${c.em}</div><div class="tag">${c.tag}</div><h3>${c.name}</h3>
        <p>${c.desc}</p><div class="bag">bag · ${c.bag.toFixed(2)} SOL</div>`;
      el.onclick=()=>{sfx.click();document.querySelectorAll('.pick').forEach(p=>p.classList.remove('sel'));
        el.classList.add('sel');S.chosen=c;$('#enter').classList.add('ready');};
      r.appendChild(el);
    });
    $('#login').classList.remove('hide');
    $('#enter').onclick=()=>{ if(!S.chosen)return; sfx.open();
      S.balance=S.chosen.bag; updateBal();
      $('#login').classList.add('hide'); setTimeout(startDesktop,300); };
  }
  function lclock(){const d=new Date();
    $('#lclock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    $('#ldate').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}

  /* ---------- desktop ---------- */
  function startDesktop(){
    buildDock(); buildGrid();
    $('#ovbtn').onclick=()=>toggleOverview();
    $('#gridbtn2').onclick=()=>{sfx.tap();openGrid();};
    $('#mutebtn').onclick=()=>{muted=!muted;$('#mutebtn').textContent=muted?'♩':'♪';if(!muted)sfx.click();};
    $('#powerbtn').onclick=()=>{sfx.close();setTimeout(()=>location.reload(),200);};
    clock(); setInterval(clock,1000); setInterval(tick,1300);
    window.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ if($('#grid').classList.contains('on'))closeGrid(); else if(S.ov)toggleOverview(false); }
    });
    openWin('degenfun'); openWin('chirper');
    toast(`gm, ${S.chosen.name}. the trenches are live.`,'good');
  }
  function clock(){const d=new Date();
    $('#tb-time').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    $('#tb-date').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

  /* ---------- dock ---------- */
  function buildDock(){
    const dk=$('#dock'); dk.innerHTML='';
    DOCK_APPS.forEach(id=>dk.appendChild(mkDockIcon(id)));
    const sep=document.createElement('div');sep.className='dk sep';dk.appendChild(sep);
    const g=document.createElement('button');g.className='dk';g.id='dk-grid';
    g.innerHTML=`<span class="ic">${ICON('apps')}</span><span class="dot"></span><span class="tip">Applications</span>`;
    g.onclick=()=>{sfx.tap();openGrid();};
    dk.appendChild(g);
    // proximity magnify
    dk.addEventListener('pointermove',dockMag);
    dk.addEventListener('pointerleave',dockReset);
  }
  function mkDockIcon(id){
    const b=document.createElement('button');b.className='dk';b.dataset.app=id;
    b.innerHTML=`<span class="ic">${ICON(id)}</span><span class="dot"></span><span class="tip">${APPS[id].title}</span>`;
    b.onclick=()=>{ sfx.open(); const w=S.wins[id];
      if(!w){openWin(id);} else if(w.min){restoreWin(id);} else if(w.el.classList.contains('focused')){minWin(id);} else focus(id); };
    return b;
  }
  let dockRaf=0;
  function dockMag(e){
    if(isMobile())return;
    if(dockRaf)return; dockRaf=requestAnimationFrame(()=>{ dockRaf=0;
      document.querySelectorAll('#dock .dk .ic').forEach(ic=>{
        const r=ic.getBoundingClientRect(); const d=Math.abs(e.clientX-(r.left+r.width/2));
        const f=Math.max(0,1-d/110); const s=1+.3*f;
        ic.style.transform=`translateY(${-7*f}px) scale(${s})`;
      });
    });
  }
  function dockReset(){ if(dockRaf){cancelAnimationFrame(dockRaf);dockRaf=0;}
    document.querySelectorAll('#dock .dk .ic').forEach(ic=>ic.style.transform=''); }
  function syncDock(){
    document.querySelectorAll('#dock .dk[data-app]').forEach(b=>{
      b.classList.toggle('run',!!S.wins[b.dataset.app]);
    });
    // apps not in dock but running get a temporary dock entry
    Object.keys(S.wins).forEach(id=>{
      if(!DOCK_APPS.includes(id)&&!document.querySelector(`#dock .dk[data-app="${id}"]`)){
        const sep=document.querySelector('#dock .dk.sep');
        const b=mkDockIcon(id); b.classList.add('run'); $('#dock').insertBefore(b,sep);
      }
    });
    document.querySelectorAll('#dock .dk[data-app]').forEach(b=>{
      if(!DOCK_APPS.includes(b.dataset.app)&&!S.wins[b.dataset.app]) b.remove();
    });
  }

  /* ---------- app grid ---------- */
  function buildGrid(){
    $('#gsearch').addEventListener('input',renderGrid);
    $('#grid').addEventListener('pointerdown',e=>{ if(e.target.id==='grid')closeGrid(); });
    renderGrid();
  }
  function renderGrid(){
    const q=($('#gsearch').value||'').toLowerCase();
    const wrap=$('#gapps'); wrap.innerHTML='';
    Object.keys(APPS).filter(id=>APPS[id].title.toLowerCase().includes(q)).forEach((id,i)=>{
      const b=document.createElement('button');b.className='ga';b.style.animationDelay=(i*30)+'ms';
      b.innerHTML=`<span class="ic">${ICON(id)}</span><span class="l">${APPS[id].title}</span>`;
      b.onclick=()=>{sfx.open();closeGrid();openWin(id);};
      wrap.appendChild(b);
    });
  }
  function openGrid(){ $('#gsearch').value=''; renderGrid(); $('#grid').classList.add('on'); $('#gsearch').focus(); }
  function closeGrid(){ $('#grid').classList.remove('on'); }

  /* ---------- window manager ---------- */
  const DEFAULT={
    degenfun:{x:130,y:70,w:560,h:500}, chirper:{x:'r',y:86,w:380,h:490},
    wallet:{x:220,y:130,w:340,h:330}, terminal:{x:180,y:150,w:540,h:330},
    darkweb:{x:250,y:150,w:360,h:260}, internet:{x:270,y:120,w:340,h:230},
    files:{x:230,y:180,w:340,h:250}, chudmail:{x:290,y:140,w:340,h:250}, gamble:{x:310,y:170,w:340,h:250}
  };
  function geoVar(w){ return `translate(${w.x}px,${w.y}px)`; }
  function openWin(id){
    let w=S.wins[id];
    if(w){ if(w.min)restoreWin(id); else focus(id); return; }
    const d=DEFAULT[id]||{x:240,y:140,w:340,h:250};
    let x=d.x==='r'?innerWidth-d.w-28:d.x;
    x=Math.max(8,Math.min(x,innerWidth-120));
    const y=Math.max(TB+6,Math.min(d.y,innerHeight-160));
    w={id,x,y,w:Math.min(d.w,innerWidth-40),h:Math.min(d.h,innerHeight-TB-100),max:false,min:false,el:null};
    const el=document.createElement('div'); el.className='win opening focused'; el.id='win-'+id;
    el.innerHTML=`
      <div class="headerbar" data-role="drag">
        <div class="hb-t"><span class="gli">${ICON(id)}</span>${APPS[id].title}</div>
        <div class="hb-c">
          <button class="wbtn" data-act="min" title="Minimize"><svg viewBox="0 0 12 12"><path d="M2 8.5h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
          <button class="wbtn" data-act="max" title="Maximize"><svg viewBox="0 0 12 12"><rect x="2.2" y="2.2" width="7.6" height="7.6" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button class="wbtn cl" data-act="close" title="Close"><svg viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
        </div>
      </div>
      <div class="win-body"></div>
      <div class="resize"></div>`;
    el.querySelector('.win-body').appendChild(content(id));
    $('#desktop').insertBefore(el,$('#snap'));
    w.el=el; S.wins[id]=w;
    applyGeom(w); el.style.setProperty('--geo',geoVar(w));
    el.addEventListener('pointerdown',e=>{ if(S.ov){e.stopPropagation();leaveOverview(id);return;} focus(id); });
    el.querySelector('.hb-c').addEventListener('click',e=>{
      const a=e.target.closest('[data-act]'); if(!a)return; e.stopPropagation();
      if(a.dataset.act==='close')closeWin(id); else if(a.dataset.act==='min')minWin(id); else toggleMax(id);
    });
    const hb=el.querySelector('.headerbar');
    hb.addEventListener('pointerdown',e=>{ if(e.target.closest('.hb-c'))return; startDrag(id,e); });
    hb.addEventListener('dblclick',e=>{ if(e.target.closest('.hb-c'))return; toggleMax(id); });
    el.querySelector('.resize').addEventListener('pointerdown',e=>startResize(id,e));
    focus(id); syncDock();
    setTimeout(()=>el.classList.remove('opening'),280);
  }
  function applyGeom(w){
    const e=w.el;
    if(w.max||isMobile()){ e.style.transform=`translate(0px,${TB}px)`; e.style.width='100%'; e.style.height=(innerHeight-TB)+'px'; }
    else { e.style.transform=geoVar(w); e.style.width=w.w+'px'; e.style.height=w.h+'px'; }
    e.style.setProperty('--geo',e.style.transform);
  }
  function focus(id){ const w=S.wins[id]; if(!w)return; S.z++; w.el.style.zIndex=S.z;
    Object.values(S.wins).forEach(o=>o.el.classList.toggle('focused',o.id===id)); syncDock(); }
  function closeWin(id){ const w=S.wins[id]; if(!w)return; sfx.close();
    w.el.style.setProperty('--geo',w.el.style.transform);
    w.el.classList.add('closing');
    setTimeout(()=>{ w.el.remove(); delete S.wins[id]; syncDock(); },160); }
  function dockRect(id){
    const b=document.querySelector(`#dock .dk[data-app="${id}"] .ic`)||document.querySelector('#dk-grid .ic');
    return b?b.getBoundingClientRect():{left:innerWidth/2,top:innerHeight-40,width:44,height:44};
  }
  function minWin(id){ const w=S.wins[id]; if(!w||w.min)return; sfx.tap();
    const r=dockRect(id); const cur=w.el.getBoundingClientRect();
    const s=Math.max(.06,r.width/cur.width);
    const tx=r.left+r.width/2-cur.width*s/2, ty=r.top+r.height/2-cur.height*s/2;
    w.el.classList.add('anim');
    w.el.style.transform=`translate(${tx}px,${ty}px) scale(${s})`;
    w.el.style.opacity='0';
    setTimeout(()=>{ w.min=true; w.el.style.display='none'; w.el.classList.remove('anim');
      w.el.style.opacity=''; applyGeom(w); syncDock(); },300);
  }
  function restoreWin(id){ const w=S.wins[id]; if(!w||!w.min)return; sfx.open();
    const r=dockRect(id);
    const s=Math.max(.06,r.width/(w.max?innerWidth:w.w));
    w.min=false; w.el.style.display='flex';
    const tw=w.max||isMobile()?innerWidth:w.w, th=w.max||isMobile()?innerHeight-TB:w.h;
    w.el.style.transform=`translate(${r.left+r.width/2-tw*s/2}px,${r.top+r.height/2-th*s/2}px) scale(${s})`;
    w.el.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      w.el.classList.add('anim'); applyGeom(w); w.el.style.opacity='1';
      setTimeout(()=>{ w.el.classList.remove('anim'); w.el.style.opacity=''; },320);
    }));
    focus(id); syncDock();
  }
  function toggleMax(id){ const w=S.wins[id]; if(!w||isMobile())return; sfx.tap();
    w.el.classList.add('anim'); w.max=!w.max; applyGeom(w);
    setTimeout(()=>w.el.classList.remove('anim'),320); }

  /* drag */
  let drag=null,raf=0,snapZone=null;
  function startDrag(id,e){
    if(isMobile()||S.ov)return; const w=S.wins[id];
    focus(id); e.preventDefault();
    snapZone=null; showSnap(null);
    drag={id,sx:e.clientX,sy:e.clientY,ox:w.x,oy:w.y,nx:w.x,ny:w.y};
    w.el.classList.add('dragging');
    window.addEventListener('pointermove',onDrag);
    window.addEventListener('pointerup',endDrag,{once:true});
    window.addEventListener('pointercancel',endDrag,{once:true});
  }
  function onDrag(e){
    if(!drag)return; const w=S.wins[drag.id];
    if(w.max){ w.max=false; applyGeom(w); drag.ox=e.clientX-w.w/2; drag.oy=TB+8; drag.sx=e.clientX; drag.sy=e.clientY; }
    let nx=drag.ox+(e.clientX-drag.sx), ny=drag.oy+(e.clientY-drag.sy);
    ny=Math.max(TB,Math.min(ny,innerHeight-80)); nx=Math.max(-w.w+90,Math.min(nx,innerWidth-90));
    drag.nx=nx; drag.ny=ny;
    let z=null; if(e.clientY<TB+6)z='max'; else if(e.clientX<8)z='left'; else if(e.clientX>innerWidth-8)z='right';
    if(z!==snapZone){snapZone=z;showSnap(z);}
    if(!raf)raf=requestAnimationFrame(()=>{raf=0;w.el.style.transform=`translate(${drag.nx}px,${drag.ny}px)`;});
  }
  function endDrag(){
    if(!drag)return; const w=S.wins[drag.id];
    w.el.classList.remove('dragging');
    if(raf){cancelAnimationFrame(raf);raf=0;}
    if(snapZone){ w.el.classList.add('anim'); applySnap(w,snapZone);
      setTimeout(()=>w.el.classList.remove('anim'),320); showSnap(null); snapZone=null; }
    else{ w.x=drag.nx; w.y=drag.ny; w.el.style.transform=geoVar(w); w.el.style.setProperty('--geo',geoVar(w)); }
    window.removeEventListener('pointermove',onDrag); drag=null;
  }
  function showSnap(z){ const s=$('#snap'); if(!z){s.classList.remove('on');return;}
    let r; if(z==='max')r=[6,TB+6,innerWidth-12,innerHeight-TB-90];
    else if(z==='left')r=[6,TB+6,innerWidth/2-9,innerHeight-TB-90];
    else r=[innerWidth/2+3,TB+6,innerWidth/2-9,innerHeight-TB-90];
    s.style.transform=`translate(${r[0]}px,${r[1]}px)`;s.style.width=r[2]+'px';s.style.height=r[3]+'px';s.classList.add('on'); }
  function applySnap(w,z){
    if(z==='max'){w.max=true;applyGeom(w);return;}
    w.max=false; w.y=TB+6; w.h=innerHeight-TB-96; w.w=Math.round(innerWidth/2)-12;
    w.x=z==='left'?6:Math.round(innerWidth/2)+6; applyGeom(w);
  }

  /* resize */
  let rez=null;
  function startResize(id,e){ if(isMobile()||S.ov)return; e.preventDefault();e.stopPropagation(); focus(id);
    const w=S.wins[id]; rez={id,sx:e.clientX,sy:e.clientY,ow:w.w,oh:w.h}; w.el.classList.add('resizing');
    window.addEventListener('pointermove',onRez); window.addEventListener('pointerup',endRez,{once:true}); }
  function onRez(e){ if(!rez)return; const w=S.wins[rez.id];
    w.w=Math.max(280,rez.ow+(e.clientX-rez.sx)); w.h=Math.max(190,rez.oh+(e.clientY-rez.sy));
    if(!raf)raf=requestAnimationFrame(()=>{raf=0;w.el.style.width=w.w+'px';w.el.style.height=w.h+'px';}); }
  function endRez(){ if(!rez)return; if(raf){cancelAnimationFrame(raf);raf=0;}
    const w=S.wins[rez.id]; w.el.classList.remove('resizing');
    w.el.style.width=w.w+'px'; w.el.style.height=w.h+'px';
    window.removeEventListener('pointermove',onRez); rez=null; }

  /* ---------- overview (GNOME activities) ---------- */
  function toggleOverview(force){
    const on=force!==undefined?force:!S.ov;
    if(on===S.ov)return;
    S.ov=on; sfx.ov();
    document.getElementById('desktop').classList.toggle('ov',on);
    $('#ovbtn').classList.toggle('on',on);
    const ids=Object.keys(S.wins);
    if(on){
      if(!ids.length){ toast('Nothing open. Open something. Lose money.','bad'); S.ov=false;
        document.getElementById('desktop').classList.remove('ov'); $('#ovbtn').classList.remove('on'); return; }
      const n=ids.length, cols=Math.ceil(Math.sqrt(n)), rows=Math.ceil(n/cols);
      const ax=40, ay=TB+34, aw=innerWidth-80, ah=innerHeight-TB-140;
      ids.forEach((id,i)=>{
        const w=S.wins[id];
        if(w.min){ w.el.style.display='flex'; w.el.style.opacity='1'; }
        const c=i%cols, r0=Math.floor(i/cols);
        const sw=aw/cols, sh=ah/rows;
        const cx=ax+(c+.5)*sw, cy=ay+(r0+.5)*sh;
        const curW=w.max||isMobile()?innerWidth:w.w, curH=w.max||isMobile()?innerHeight-TB:w.h;
        const s=Math.min((sw-36)/curW,(sh-36)/curH,1);
        w.el.classList.add('anim');
        w.el.style.transform=`translate(${cx-curW*s/2}px,${cy-curH*s/2}px) scale(${s})`;
      });
    } else {
      ids.forEach(id=>{
        const w=S.wins[id];
        applyGeom(w);
        setTimeout(()=>{ w.el.classList.remove('anim');
          if(w.min){ w.el.style.display='none'; } },320);
      });
    }
  }
  function leaveOverview(id){
    const w=S.wins[id]; if(w&&w.min)w.min=false;
    toggleOverview(false); focus(id); syncDock();
  }

  /* ---------- app content ---------- */
  function content(id){
    if(id==='degenfun')return degenfun();
    if(id==='chirper')return chirper();
    if(id==='wallet')return wallet();
    if(id==='terminal')return terminal();
    const d=document.createElement('div');d.className='flavor';
    d.innerHTML=`<span class="fbig">${ICON(id)}</span>${FLAVOR[id]||'Coming soon to the trenches.'}`;return d;
  }

  function degenfun(){
    const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;height:100%';
    const list=document.createElement('div');list.style.cssText='flex:1;overflow:auto';
    S.coins.forEach(c=>{
      const row=document.createElement('div');row.className='coin'+(c.id===S.sel?' sel':'');row.dataset.coin=c.id;
      row.innerHTML=`<div><div class="nm">${c.nm}</div><div class="tk">$${c.tk}</div></div>
        <canvas width="72" height="26"></canvas>
        <div><div class="pr">$${fmt(c.price)}</div><div class="ch ${c.ch>=0?'up':'down'}">${c.ch>=0?'+':''}${c.ch.toFixed(0)}%</div></div>`;
      row.onclick=()=>{sfx.click();S.sel=c.id;list.querySelectorAll('.coin').forEach(r=>r.classList.toggle('sel',r.dataset.coin===c.id));};
      list.appendChild(row); drawSpark(row.querySelector('canvas'),c.hist,c.ch>=0);
    });
    const panel=document.createElement('div');panel.className='buypanel';
    panel.innerHTML=`<div class="row"><input id="amt" value="2.00" inputmode="decimal"><button class="btn ghost" id="maxb">MAX</button></div>
      <div class="row"><button class="btn buy" id="buyb" style="flex:1">BUY</button><button class="btn sell" id="sellb" style="flex:1">SELL</button></div>
      <button class="btn gold" id="launchb">＋ LAUNCH YOUR OWN COIN</button>`;
    wrap.appendChild(list);wrap.appendChild(panel);
    setTimeout(()=>{
      const q=s=>panel.querySelector(s);
      q('#maxb').onclick=()=>{q('#amt').value=S.balance.toFixed(2);sfx.click();};
      q('#buyb').onclick=()=>trade('buy',q('#amt'));
      q('#sellb').onclick=()=>trade('sell',q('#amt'));
      q('#launchb').onclick=()=>{sfx.coin();toast('Coin deployed. Now go shill it, degen.','good');};
    },0);
    return wrap;
  }
  function trade(kind,amtEl){
    const amt=parseFloat(amtEl.value)||0;const c=S.coins.find(x=>x.id===S.sel);
    if(amt<=0){sfx.err();toast('Invalid amount','bad');return;}
    if(kind==='buy'&&amt>S.balance){sfx.err();toast(`Insufficient ${W.sym}. Cope.`,'bad');return;}
    S.balance+=kind==='buy'?-amt:amt*(1+(Math.random()*.4-.1));
    S.balance=Math.max(0,S.balance);updateBal();
    sfx.coin();
    toast(kind==='buy'?`Bought ${amt.toFixed(2)} of $${c.tk}`:`Sold $${c.tk} for ${amt.toFixed(2)} ${W.sym}`,kind==='buy'?'good':'sell');
  }

  function chirper(){
    const wrap=document.createElement('div');wrap.style.cssText='height:100%;overflow:auto';
    const comp=document.createElement('div');comp.className='composer';
    comp.innerHTML=`<input placeholder="post your PnL… or larp it"><button class="btn gold">CHIRP</button>`;
    const feed=document.createElement('div');feed.className='feed';
    POSTS.forEach(p=>feed.appendChild(mkPost(p)));
    wrap.appendChild(comp);wrap.appendChild(feed);
    const b=comp.querySelector('button'),i=comp.querySelector('input');
    b.onclick=()=>{const v=i.value.trim();if(!v){sfx.err();return;}sfx.coin();
      feed.insertBefore(mkPost({u:S.chosen?S.chosen.name:'you',h:'now',b:v}),feed.firstChild);i.value='';
      toast('Chirped. Clout +12','good');};
    return wrap;
  }
  const POSTS=[
    {u:'exitliquidity',h:'2m',b:'if you’re reading this you’re still early on $GRUMP (i am not early, i need you to buy)'},
    {u:'rugpull_rick',h:'8m',b:'down 96% but my conviction is at ALL TIME HIGH 💎'},
    {u:'wagmi_wendy',h:'14m',b:'sold my car for $CMR. sold the wife’s car too. she doesn’t know yet.'},
    {u:'chartschizo',h:'22m',b:'this is either a bull flag or i am financially ruined. no in between.'},
    {u:'grandma',h:'1h',b:'sweetie did you get my email about the surgery. also what is a HODL'}
  ];
  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    })[m]);
  }

  function mkPost(p){const d=document.createElement('div');d.className='post';
    const safeBody = escapeHTML(p.b).replace(/\$([A-Z]+)/g,'<span class="cash">$$$1</span>');
    d.innerHTML=`<div class="ph"><span class="av">${(p.u||'?')[0].toUpperCase()}</span>
      <span class="un">${escapeHTML(p.u)}</span><span class="hd">@${escapeHTML(p.u||'').toLowerCase().replace(/\s/g,'')} · ${p.h}</span></div>
      <div class="bd">${safeBody}</div>`;return d;}

  function wallet(){const d=document.createElement('div');d.className='pad';
    d.innerHTML=`<div style="font-family:var(--mono);font-size:12px;color:var(--muted)">TOTAL BALANCE</div>
      <div id="wbig" style="font-size:34px;font-weight:800;color:var(--gold);margin:6px 0 14px">${S.balance.toFixed(2)} <span style="font-size:16px;color:var(--muted)">${W.sym}</span></div>
      <canvas id="wspark" width="300" height="70" style="width:100%;max-width:320px"></canvas>
      <div style="font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:12px">cold storage: a sticky note somewhere</div>`;
    setTimeout(()=>{const cv=d.querySelector('#wspark');if(cv)drawSpark(cv,hist(Math.max(S.balance,.1),true),true,true);},0);
    return d;}

  /* terminal */
  function terminal(){
    const t=document.createElement('div');t.className='term';
    const hist=document.createElement('div');t.appendChild(hist);
    const inRow=document.createElement('div');inRow.className='ln';
    inRow.innerHTML=`<span class="p">degen@trench</span><span class="dim">:~$ </span>`;
    const inp=document.createElement('input');inRow.appendChild(inp);t.appendChild(inRow);
    t.addEventListener('pointerup',()=>inp.focus());
    const print=(html)=>{const d=document.createElement('div');d.className='ln';d.innerHTML=html;hist.appendChild(d);t.scrollTop=t.scrollHeight;};
    print(`<span class="dim">${W.os} terminal — type <span class="g">help</span></span>`);
    inp.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      const raw=inp.value.trim();inp.value='';
      print(`<span class="p">degen@trench</span><span class="dim">:~$</span> ${escapeHTML(raw)}`);
      if(!raw)return; sfx.tap();
      const [cmd,...args]=raw.split(/\s+/);
      switch(cmd){
        case 'help': print('<span class="g">help</span>  <span class="g">neofetch</span>  <span class="g">bal</span>  <span class="g">coins</span>  <span class="g">buy &lt;amt&gt;</span>  <span class="g">larp</span>  <span class="g">whoami</span>  <span class="g">clear</span>  <span class="g">exit</span>'); break;
        case 'neofetch': print(
`<span class="g">   ▄▄▄▄▄▄▄▄▄</span>    <span class="p">degen@trench_os</span>
<span class="g">   █ ▄▄▄▄▄ █</span>    ─────────────────
<span class="g">   █ █▀▀▀█ █</span>    OS: <span class="g">${W.os} v0.3</span> (degen/stable)
<span class="g">   █ █▄▄▄█ █</span>    Kernel: 6.9-copium
<span class="g">   █▄▄▄▄▄▄▄█</span>    Uptime: since rock bottom
                 Shell: cope 5.2.1
                 Balance: <span class="g">${S.balance.toFixed(2)} ${W.sym}</span>
                 Theme: Matte-Blue [dark]`); break;
        case 'bal': print(`<span class="g">${S.balance.toFixed(2)} ${W.sym}</span>`); break;
        case 'coins': S.coins.forEach(c=>print(`$${c.tk.padEnd(6)} $${fmt(c.price)}  <span class="${c.ch>=0?'p':'r'}">${c.ch>=0?'+':''}${c.ch.toFixed(0)}%</span>`)); break;
        case 'buy': { const a=parseFloat(args[0]);
          if(!a||a<=0){print('<span class="r">usage: buy &lt;amount&gt;</span>');break;}
          if(a>S.balance){print(`<span class="r">insufficient ${W.sym}. cope.</span>`);sfx.err();break;}
          S.balance-=a;updateBal();sfx.coin();
          const c=S.coins.find(x=>x.id===S.sel);
          print(`bought <span class="g">${a.toFixed(2)}</span> of $${c.tk}. godspeed.`); break; }
        case 'larp': sfx.coin(); toast('Posted fake PnL. Clout +40 (for now)','good');
          print('<span class="g">+2,400% PnL screenshot posted.</span> <span class="dim">it is photoshop. everyone claps.</span>'); break;
        case 'whoami': print(S.chosen?`${escapeHTML(S.chosen.name)} <span class="dim">— ${escapeHTML(S.chosen.desc)}</span>`:'a degen'); break;
        case 'clear': hist.innerHTML=''; break;
        case 'exit': closeWin('terminal'); break;
        case 'sudo': print('<span class="r">you have no power here.</span>'); sfx.err(); break;
        case 'rm': print('<span class="r">nice try. grandma would be disappointed.</span>'); sfx.err(); break;
        default: print(`<span class="r">command not found:</span> ${escapeHTML(cmd)} <span class="dim">(try help)</span>`);
      }
    });
    setTimeout(()=>inp.focus(),80);
    return t;
  }

  /* ---------- sparkline ---------- */
  function drawSpark(cv,data,up,fill){
    const ctx=cv.getContext('2d');const W=cv.width,H=cv.height,pad=3;
    ctx.clearRect(0,0,W,H);
    const mn=Math.min(...data),mx=Math.max(...data),rg=(mx-mn)||1;
    const col=up?'#34D399':'#F5566E';
    ctx.beginPath();
    data.forEach((v,i)=>{const x=pad+i/(data.length-1)*(W-pad*2);const y=H-pad-((v-mn)/rg)*(H-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    if(fill){ctx.lineTo(W-pad,H);ctx.lineTo(pad,H);ctx.closePath();
      const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,col+'55');g.addColorStop(1,col+'00');
      ctx.fillStyle=g;ctx.fill();ctx.beginPath();
      data.forEach((v,i)=>{const x=pad+i/(data.length-1)*(W-pad*2);const y=H-pad-((v-mn)/rg)*(H-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});}
    ctx.strokeStyle=col;ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
    const lx=W-pad,ly=H-pad-((data[data.length-1]-mn)/rg)*(H-pad*2);
    ctx.beginPath();ctx.arc(lx,ly,2,0,7);ctx.fillStyle=col;ctx.fill();
  }

  /* ---------- live tick ---------- */
  function tick(){
    if(S.ov)return;
    S.coins.forEach(c=>{
      const last=c.hist[c.hist.length-1];
      const drift=c.rug?-last*.02:(c.up?last*.004:-last*.004);
      let nv=Math.max(last+drift+(Math.random()-.5)*last*.05,c.price*.02);
      c.hist=[...c.hist.slice(1),nv];
      c.ch+=(nv-last)/c.price*100*.5;if(c.rug)c.ch=Math.min(c.ch,-8);c.ch=Math.max(-96,Math.min(9999,c.ch));c.price=nv;
    });
    const win=S.wins.degenfun;if(win&&!win.min){
      win.el.querySelectorAll('.coin').forEach(row=>{
        const c=S.coins.find(x=>x.id===row.dataset.coin);if(!c)return;
        row.querySelector('.pr').textContent='$'+fmt(c.price);
        const ch=row.querySelector('.ch');ch.textContent=(c.ch>=0?'+':'')+c.ch.toFixed(0)+'%';ch.className='ch '+(c.ch>=0?'up':'down');
        drawSpark(row.querySelector('canvas'),c.hist,c.ch>=0);
      });
    }
  }

  /* ---------- misc ---------- */
  function toast(text,kind){const t=document.createElement('div');t.className='toast '+(kind||'');
    t.textContent=text;$('#toasts').appendChild(t);
    setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity='0';t.style.transform='translateY(-8px)';
      setTimeout(()=>t.remove(),300);},2600);}
  function updateBal(){$('#tb-bal').textContent=S.balance.toFixed(2)+' '+W.sym;
    const wb=document.getElementById('wbig');if(wb)wb.innerHTML=`${S.balance.toFixed(2)} <span style="font-size:16px;color:var(--muted)">${W.sym}</span>`;}
  function fmt(p){return p<.01?p.toFixed(5):p.toFixed(4);}

  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
    Object.values(S.wins).forEach(w=>{if(w.max||isMobile())applyGeom(w);
      else{w.x=Math.min(w.x,innerWidth-90);w.y=Math.max(TB,Math.min(w.y,innerHeight-90));if(!w.min)applyGeom(w);}});
  },120);});

  window.addEventListener('pointerdown',()=>ac(),{once:true});
  setInterval(lclock,20000);
  runBoot();
})();
</script>
